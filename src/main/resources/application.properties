# Common Setting
spring.application.name=DURI-CORE
spring.application.version=${project.version}

# Profile Active
#spring.profiles.active=${ACTIVE_PROFILE:dev}
spring.profiles.active=dev
server.port=${SERVER_PORT:8070}
spring.datasource.url=jdbc:mariadb://localhost:3307/duri?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=duri
spring.datasource.password=Duriduri!

spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
# Google Cloud Storage 비활성화 (활성화 시 true로 변경 후 project-id, bucket-name 설정)
google.cloud.storage.enabled=false
# google.cloud.storage.bucket-name=duri-bucket
# google.cloud.storage.project-id=your-project-id